# ============================================
# APPLICATION BASICS
# ============================================

# Nom de l'application
spring.application.name=Dev-Learning-Roadmap-Manager

# Port du serveur
server.port=8081

# URL de la base de donnees PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/plateformeEducative?useSSL=false&serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=login

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuration du stockage GED (Chemin vers ton disque dur)
# Assure-toi que ce dossier existe ou que l'app a les droits d'écriture
file.upload-dir=uploads

# Limite de taille des fichiers pour l'upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Format des dates pour l'API
spring.jackson.serialization.write-dates-as-timestamps=false

# Durée : 24h
jwt.expiration.time=86400000

# Cette clé est un exemple en Base64 (512 bits).
# NE PAS mettre d'espaces avant ou après.
jwt.secret.key=Y29uZmlndXJhdGlvbi1zZWNyZXRlLWtleS1mb3ItamVuaXRoLXdvcmtzcGFjZS1kZXZlbG9wbWVudC0yMDI2LXZlcnNpb24=





# CONFIGURATION JAVA MAIL SENDER GMAIL


# Adresse du serveur SMTP de Gmail
spring.mail.host=smtp.gmail.com

# Port SMTP avec chiffrement TLS (587 recommandé, 465 pour SSL)
spring.mail.port=587

# Ton adresse Gmail qui va envoyer les emails
spring.mail.username=educationpriorites@gmail.com

# Mot de passe d'application Gmail (PAS ton vrai mot de passe)
# À générer sur : myaccount.google.com - Sécurité - Mots de passe des applications
spring.mail.password=hlnq kart mjjq uzhg

# Gmail exige que tu prouves ton identité avant d'envoyer un email.
# Sans cette ligne, le serveur SMTP de Gmail refusera la connexion
# avec une erreur "Authentication required".
spring.mail.properties.mail.smtp.auth=true

# STARTTLS est un mécanisme qui UPGRADES une connexion non chiffrée
# en connexion chiffrée (TLS) APRÈS la connexion initiale.
# Concrètement : ton app se connecte en clair sur le port 587,
# puis immédiatement demande à passer en mode chiffré.
# Sans ça, les identifiants (email + mot de passe) transitent
# en clair sur le réseau ? énorme faille de sécurité.
spring.mail.properties.mail.smtp.starttls.enable=true

# Renforce la sécurité de la ligne du dessus.
# Si "enable" dit "essaie de chiffrer si possible",
# "required" dit "refuse la connexion si le chiffrement échoue".
# Sans cette ligne, si le serveur ne supporte pas TLS,
# l'email partirait quand même EN CLAIR sans que tu le saches.
# Avec cette ligne : échec propre plutôt que transmission non sécurisée.
spring.mail.properties.mail.smtp.starttls.required=true

# Indique à Spring quel protocole utiliser pour l'envoi.
# SMTP (Simple Mail Transfer Protocol) est le standard universel
# d'envoi d'emails. Les alternatives seraient SMTPS (SMTP over SSL)
# ou IMAP/POP3 (qui sont pour la RÉCEPTION, pas l'envoi).
spring.mail.protocol=smtp

# Temps maximum (en ms) pour ÉTABLIR la connexion avec le serveur Gmail.
# Si Gmail ne répond pas dans ce délai, une exception est levée
# plutôt que d'attendre indéfiniment.
# 10000ms = 10 secondes. Au-delà, on considère le serveur injoignable.
# Utile pour éviter que ton app se fige si Gmail est lent ou inaccessible.
spring.mail.properties.mail.smtp.connectiontimeout=10000

# Temps maximum (en ms) pour RECEVOIR une réponse de Gmail
# après que la connexion est déjà établie.
# Exemple : après avoir envoyé les données de l'email,
# si Gmail met plus de 10s à confirmer la réception ? timeout.
# Différent du connectiontimeout : ici la connexion existe déjà,
# c'est le silence prolonged pendant la communication qui est limité.
spring.mail.properties.mail.smtp.timeout=10000



